name: CI Pipeline

on: 
  pull_request: 
    branches: ["dev"]
  push:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Backend ----------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Backend
        run: ./mvnw clean install -DskipTests
        working-directory: Backend/TaskSphere

      # ---------- Frontend ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build
        working-directory: Frontend/Tasksphere
